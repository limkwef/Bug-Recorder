<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐛 个人Bug记录系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #4f6ef7;
            --primary-hover: #3b56d9;
            --text: #1e293b;
            --text-secondary: #64748b;
            --radius: 12px;
            --shadow: 0 4px 15px rgba(79,110,247,.3);
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .landing-card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 640px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,.15);
            text-align: center;
        }
        .landing-card h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
        .landing-card .subtitle { color: var(--text-secondary); margin-bottom: 32px; font-size: .95rem; }
        .mode-card {
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 24px 20px;
            margin-bottom: 16px;
            transition: all .2s;
            cursor: pointer;
            text-align: left;
            display: block;
            text-decoration: none;
            color: inherit;
        }
        .mode-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 20px rgba(79,110,247,.15);
            transform: translateY(-2px);
            text-decoration: none;
            color: inherit;
        }
        .mode-card .title { font-size: 1.1rem; font-weight: 600; }
        .mode-card .desc { font-size: .85rem; color: var(--text-secondary); margin-top: 4px; }
        .mode-card .tag {
            display: inline-block;
            font-size: .72rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 6px;
            margin-top: 8px;
        }
        .tag-server { background: #e0e7ff; color: #4f6ef7; }
        .tag-standalone { background: #fef3c7; color: #d97706; }
        .footer-link {
            margin-top: 20px;
            font-size: .82rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="landing-card">
        <h1>🐛 Bug 记录系统</h1>
        <p class="subtitle">个人项目 bug 追踪，两种模式可选</p>

        <a href="http://localhost:3002/" class="mode-card">
            <div class="title">🖥️ 服务器模式 <span class="tag tag-server">推荐</span></div>
            <div class="desc">
                数据保存在 SQLite 数据库，支持文件上传到磁盘。<br>
                需要先启动 <code>node server.js</code>（或双击 启动系统.bat）
            </div>
        </a>

        <a href="public/standalone.html" class="mode-card">
            <div class="title">📄 单机模式 <span class="tag tag-standalone">无需服务器</span></div>
            <div class="desc">
                数据保存在浏览器 localStorage，直接打开即可使用。<br>
                注意：清除浏览器缓存会导致数据丢失，请定期导出备份。
            </div>
        </a>

        <div class="footer-link">
            端口 3002 · 数据文件 <code>data/database.sqlite</code>
        </div>
    </div>
</body>
</html>
